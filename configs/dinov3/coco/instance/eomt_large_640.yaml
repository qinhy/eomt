trainer:
  max_epochs: 12
  check_val_every_n_epoch: 2
  logger:
    class_path: lightning.pytorch.loggers.CSVLogger
    init_args:
      save_dir: logs
      name: "coco_instance_eomt_large_640_dinov3"
model:
  class_path: training.mask_classification_instance.MaskClassificationInstance
  init_args:
    attn_mask_annealing_enabled: True
    attn_mask_annealing_start_steps: [14782, 29564, 44346, 59128]
    attn_mask_annealing_end_steps: [29564, 44346, 59128, 73910]
    lr: 2e-4
    llrd_l2_enabled: False
    warmup_steps: [2000, 3000]
    delta_weights: True
    bbox_l1_coefficient: 5.0
    bbox_giou_coefficient: 2.0
    # network:
    #   class_path: models.eomt.EoMT
    #   init_args:
    #     num_q: 200
    #     bbox_head_enabled: True
    #     encoder:
    #       class_path: models.vit.ViT
    #       init_args:
    #         backbone_name: facebook/dinov3-vitl16-pretrain-lvd1689m
    network:
      class_path: models.eomt_dinov3.EoMT
      init_args:
        num_q: 200
        bbox_head_enabled: True
        encoder_repo: ../dinov3
        encoder_model: dinov3_vitl16
        encoder_weights: ../BitNetCNN/data/dinov3_vitl16_pretrain_lvd1689m-8aa4cbdd.pth
data:
  class_path: datasets.coco_instance.COCOInstance
